<!DOCTYPE html>
<html>
<head>
  <title>Users Project</title>
  <style>
    body {
      font-family: Arial;
      background: #eef2f3;
    }
    h1 {
      text-align: center;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 15px;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
  </style>
</head>

<body>

<h1>Users</h1>
<p id="loading">Loading...</p>
<div class="container" id="users"></div>

<script>
  fetch('https://jsonplaceholder.typicode.com/users')
    .then(response => response.json())
    .then(data => {
      document.getElementById("loading").style.display = "none";

      data.forEach(user => {
        let card = `
          <div class="card">
            <h3>${user.name}</h3>
            <p>Email: ${user.email}</p>
            <p>City: ${user.address.city}</p>
          </div>
        `;
        document.getElementById("users").innerHTML += card;
      });
    })
    .catch(error => {
      document.getElementById("loading").innerText = "Error loading data!";
    });
</script>

</body>
</html>
